<!-- Additional CSS for styling -->
<style>
    .footer-style-2 {
        background-color: #2c3e50;
        padding: 40px 0 0;
        color: #ffffff;
    }

    .widget-title h4 {
        font-size: 32px;
        margin-bottom: 40px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        position: relative;
        display: inline-block;
        padding-bottom: 15px;
    }

    .widget-title h4::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 3px;
        background-color: #3498db;
    }

    .info-box, .social-box {
        padding: 30px;
        background-color: rgba(52, 73, 94, 0.5);
        border-radius: 10px;
        margin-bottom: 30px;
        transition: transform 0.3s ease;
        height: 100%;
    }

    .info-box:hover, .social-box:hover {
        transform: translateY(-5px);
    }

    .contact-details {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .contact-details li {
        margin-bottom: 20px;
        font-size: 16px;
        display: flex;
        align-items: center;
    }

    .contact-details li i {
        margin-right: 15px;
        color: #3498db;
        width: 20px;
        font-size: 18px;
    }

    .contact-details li .fa-phone {
        transform: scaleX(-1);
    }

    .contact-details a, .social-icon {
        color: #ecf0f1;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .contact-details a:hover {
        color: #3498db;
    }

    .social-links-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 150px;
    }

    .social-links {
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .social-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: #34495e;
        color: white;
        transition: all 0.3s ease;
    }

    .social-icon:hover {
        background-color: #3498db;
        transform: translateY(-3px);
    }

    .copyright-sec {
        background-color: #34495e;
        padding: 20px 0;
        margin-top: 40px;
    }

    .copy-right p {
        margin: 0;
        text-align: center;
        color: #ecf0f1;
    }

    .copy-right a {
        color: #3498db;
        text-decoration: none;
    }

    .copy-right a:hover {
        text-decoration: underline;
    }

    .text-white {
        color: #ffffff !important;
    }

    .mb-4 {
        margin-bottom: 1.5rem;
    }

    @media (max-width: 768px) {
        .info-box, .social-box {
            margin: 15px;
        }
        
        .widget-title h4 {
            font-size: 28px;
        }
    }
</style>
<script src="{% static 'js/scripts.js' %}"></script>
<script src="{% static 'js/functions.js' %}"></script>
