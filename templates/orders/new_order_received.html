<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional //EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:v="urn:schemas-microsoft-com:vml" lang="en">
<head>
    <link rel="stylesheet" type="text/css" hs-webfonts="true" href="https://fonts.googleapis.com/css?family=Lato|Lato:i,b,bi">
    <meta property="og:title" content="Email template">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css">
        #email {
            margin: auto;
            width: 600px;
            background-color: white;
        }
        .order-notification {
            font-size: 18px;
            color: #33475B;
            text-align: center;
        }
        .order-details {
            font-size: 16px;
            color: #33475B;
            margin: 20px 0;
            line-height: 1.5;
        }
        .footer {
            padding: 15px;
            background-color: #C33332;
            color: white;
            text-align: center;
            font-size: 14px;
        }
        .footer a {
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body bgcolor="#F5F8FA" style="width: 100%; margin: auto 0; padding: 0; font-family: Lato, sans-serif; font-size: 16px; color: #33475B; word-break: break-word">
    <div id="email">
        <!-- Logo Section -->
        <table role="presentation" width="100%">
            <tr>
                <td align="center" style="padding: 20px;">
                    <img alt="Logo" src="https://rathank.com/foodonline/logo/logo.png" width="400px">
                </td>
            </tr>
        </table>
        <!-- Main Content -->
        <table bgcolor="#EAF0F6" width="100%" role="presentation" border="0" cellpadding="0" cellspacing="10px" style="padding: 30px;">
            <tr>
                <td>
                    <h2 style="text-align: center;">New Order Received</h2>
                    <p class="order-notification">Hi,</p>
                    <p class="order-notification">You have received a new order.</p>
                    <div class="order-details">
                        <p><strong>Order No.:</strong> {{order.order_number}}</p>
                        <p><strong>Transaction ID:</strong> {{order.payment.transaction_id}}</p>
                    </div>
                </td>
            </tr>
        </table>
        <!-- Footer -->
        <table role="presentation" bgcolor="#C33332" width="100%">
            <tr>
                <td class="footer">
                    <p>©2025 FoodOnline Marketplace, All Rights Reserved.</p>
                    <a href="http://{{domain}}" style="color: #fff;">Visit Website</a>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
